<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#07071a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="ZMAX3">
<title>ZMAX3 — إجابات الفصول</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#07071a;
  --surface:rgba(13,13,28,.88);
  --card:rgba(16,16,34,.78);
  --card2:rgba(22,22,42,.85);
  --border:rgba(255,255,255,.07);
  --border2:rgba(255,255,255,.12);
  --glass:rgba(255,255,255,.045);
  --glass2:rgba(255,255,255,.09);
  --primary:#7c6aff;
  --primary-dim:rgba(124,106,255,.18);
  --primary-glow:rgba(124,106,255,.3);
  --secondary:#ff5f87;
  --accent:#00e5a0;
  --text:#eeeef8;
  --text2:#aaaac8;
  --muted:#6668a0;
  --muted2:#40406a;
  --code-bg:rgba(4,4,16,.95);
  --code-text:#7dd3fc;
  --kw:#c792ea; --fn:#82aaff; --str:#c3e88d; --num:#f78c6c; --op:rgba(137,221,255,.65); --cm:#546e7a;
  --r:18px; --r2:13px;
  --ease:.2s cubic-bezier(.4,0,.2,1);
  --spring:.4s cubic-bezier(.34,1.56,.64,1);
  --glass-shadow:0 8px 32px rgba(0,0,0,.4), 0 0 0 1px rgba(255,255,255,.06) inset;
}
[data-theme=light]{
  --bg:#eeeeff;
  --surface:rgba(228,228,252,.9);
  --card:rgba(255,255,255,.75);
  --card2:rgba(245,245,255,.88);
  --border:rgba(100,100,200,.1);
  --border2:rgba(100,100,200,.18);
  --glass:rgba(255,255,255,.55);
  --glass2:rgba(255,255,255,.8);
  --text:#14142a; --text2:#3a3a5e; --muted:#5a5a90; --muted2:#9090b8;
  --code-bg:rgba(10,10,28,.96);
  --glass-shadow:0 8px 32px rgba(100,100,200,.12), 0 0 0 1px rgba(255,255,255,.85) inset;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{font-family:'Cairo',sans-serif;min-height:100vh;overflow-x:hidden;color:var(--text);transition:color var(--ease)}

/* BG */
.bg{position:fixed;inset:0;z-index:-2;transition:background .5s;
  background:radial-gradient(ellipse 130% 90% at 20% 0%,#0d0722 0%,#060614 50%,#070610 100%);}
[data-theme=light] .bg{background:radial-gradient(ellipse 130% 90% at 20% 0%,#ddd8ff 0%,#eeeaff 50%,#f2f0ff 100%);}
.orbs{position:fixed;inset:0;z-index:-1;pointer-events:none;overflow:hidden}
.orb{position:absolute;border-radius:50%;filter:blur(90px);animation:orbF 14s ease-in-out infinite alternate}
.orb1{width:700px;height:700px;background:rgba(124,106,255,.11);top:-150px;right:-150px}
.orb2{width:550px;height:550px;background:rgba(255,95,135,.07);bottom:-100px;left:-100px;animation-delay:-6s}
.orb3{width:450px;height:450px;background:rgba(0,229,160,.05);top:40%;left:35%;animation-delay:-10s}
@keyframes orbF{0%{transform:translate(0,0) scale(1)}100%{transform:translate(35px,25px) scale(1.1)}}
[data-theme=light] .orb1{background:rgba(124,106,255,.07)}
[data-theme=light] .orb2{background:rgba(255,95,135,.05)}
body::after{content:'';position:fixed;inset:0;z-index:9998;pointer-events:none;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.028'/%3E%3C/svg%3E");opacity:.5}

/* ══ LOCK ══ */
#lock{position:fixed;inset:0;z-index:2000;display:flex;align-items:center;justify-content:center}
.lock-glass{
  position:relative;
  background:rgba(255,255,255,.055);
  backdrop-filter:blur(40px) saturate(1.5);
  -webkit-backdrop-filter:blur(40px) saturate(1.5);
  border:1px solid rgba(255,255,255,.13);
  border-radius:28px;padding:44px 40px 38px;
  width:90%;max-width:400px;text-align:center;
  box-shadow:0 0 0 1px rgba(124,106,255,.2) inset, 0 30px 80px rgba(0,0,0,.5);
  animation:lockIn .7s var(--spring);
}
.lock-glass::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(124,106,255,.9),rgba(255,95,135,.6),transparent);
  border-radius:28px 28px 0 0;}
@keyframes lockIn{from{opacity:0;transform:scale(.82) translateY(40px)}to{opacity:1;transform:scale(1) translateY(0)}}
.lock-mascot{width:110px;height:110px;object-fit:contain;margin:0 auto 18px;display:block;
  filter:drop-shadow(0 8px 28px rgba(124,106,255,.5));animation:mascotFloat 3s ease-in-out infinite}
@keyframes mascotFloat{0%,100%{transform:translateY(0) rotate(-2deg)}50%{transform:translateY(-10px) rotate(2deg)}}
.lock-title{font-size:26px;font-weight:900;letter-spacing:-.5px;margin-bottom:5px}
.lock-sub{color:var(--muted);font-size:13px;margin-bottom:28px}
.lock-input{
  width:100%;background:rgba(0,0,0,.35);backdrop-filter:blur(10px);
  border:1.5px solid rgba(255,255,255,.1);border-radius:var(--r2);padding:17px;
  font-family:'JetBrains Mono',monospace;font-size:26px;color:#fff;
  text-align:center;letter-spacing:12px;outline:none;margin-bottom:14px;
  transition:border-color .25s,box-shadow .25s;
}
.lock-input:focus{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-dim)}
.lock-input::placeholder{color:rgba(255,255,255,.2);letter-spacing:4px}
.lock-btn{
  width:100%;padding:15px;border:none;border-radius:var(--r2);
  background:linear-gradient(135deg,var(--primary),#9b88ff);color:#fff;
  font-family:'Cairo',sans-serif;font-size:16px;font-weight:700;cursor:pointer;
  box-shadow:0 4px 24px rgba(124,106,255,.5);
  transition:transform .18s,box-shadow .18s;
}
.lock-btn:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(124,106,255,.65)}
.lock-btn:active{transform:translateY(1px)}
.lock-err{color:var(--secondary);font-size:13px;margin-top:11px;min-height:18px;font-weight:600}
.shake{animation:shake .4s ease}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-9px)}75%{transform:translateX(9px)}}

/* ══ APP ══ */
#app{display:none;min-height:100vh}
.layout{display:flex;min-height:100vh}

/* ══ SIDEBAR ══ */
.sidebar{
  width:272px;flex-shrink:0;
  background:var(--surface);
  backdrop-filter:blur(28px) saturate(1.3);
  -webkit-backdrop-filter:blur(28px) saturate(1.3);
  border-left:1px solid var(--border2);
  position:sticky;top:0;height:100vh;
  overflow-y:auto;overflow-x:hidden;
  display:flex;flex-direction:column;z-index:50;
  scrollbar-width:thin;scrollbar-color:var(--border2) transparent;
  transition:transform .3s cubic-bezier(.4,0,.2,1);
}
.sidebar::-webkit-scrollbar{width:3px}
.sidebar::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
.sb-hdr{padding:18px 16px 12px;border-bottom:1px solid var(--border);flex-shrink:0}
.brand{display:flex;align-items:center;gap:10px;margin-bottom:13px}
.brand-mascot{width:38px;height:38px;object-fit:contain;flex-shrink:0;
  border-radius:10px;background:var(--primary-dim);border:1px solid rgba(124,106,255,.3);padding:2px}
.brand-name{font-weight:900;font-size:17px;background:linear-gradient(135deg,var(--primary),#c4b5fd);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent}
.brand-tag{font-size:9px;color:var(--muted)}
.srch-wrap{position:relative}
.srch-inp{
  width:100%;background:var(--glass);border:1px solid var(--border2);border-radius:9px;
  padding:9px 12px 9px 34px;font-family:'Cairo',sans-serif;font-size:12px;color:var(--text);
  outline:none;transition:border-color .2s;direction:rtl;
}
.srch-inp::placeholder{color:var(--muted2)}
.srch-inp:focus{border-color:var(--primary)}
.srch-ico{position:absolute;right:11px;top:50%;transform:translateY(-50%);color:var(--muted2);font-size:13px;pointer-events:none}
.sb-stats{display:flex;gap:5px;padding:8px 14px;border-bottom:1px solid var(--border);flex-shrink:0}
.st-p{flex:1;background:var(--glass);border:1px solid var(--border);border-radius:8px;padding:7px;text-align:center}
.st-p .n{font-size:16px;font-weight:900;color:var(--primary);line-height:1}
.st-p .l{font-size:9px;color:var(--muted);margin-top:1px}
.sb-label{padding:10px 16px 4px;font-size:9px;text-transform:uppercase;letter-spacing:2px;color:var(--muted2);font-weight:700;flex-shrink:0}
.ch-list{flex:1;padding:0 8px 12px;display:flex;flex-direction:column;gap:1px}
.ch-item{
  display:flex;align-items:center;gap:8px;padding:7px 10px;
  border-radius:9px;cursor:pointer;border:1px solid transparent;
  transition:all var(--ease);
}
.ch-item:hover{background:var(--glass2);border-color:var(--border2)}
.ch-item.active{background:var(--primary-dim);border-color:rgba(124,106,255,.35);box-shadow:0 2px 12px rgba(124,106,255,.12)}
.ch-badge{
  width:28px;height:28px;border-radius:7px;flex-shrink:0;
  background:var(--glass);border:1px solid var(--border2);
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;color:var(--muted);transition:all var(--ease);
}
.ch-item.active .ch-badge,.ch-item:hover .ch-badge{
  background:linear-gradient(135deg,var(--primary),#8b5cf6);
  border-color:transparent;color:#fff;box-shadow:0 2px 10px rgba(124,106,255,.4);
}
.ch-info{flex:1;min-width:0}
.ch-lbl{font-size:12px;font-weight:600;color:var(--muted);transition:color var(--ease)}
.ch-item.active .ch-lbl,.ch-item:hover .ch-lbl{color:var(--text)}
.ch-bar{height:2px;background:var(--border2);border-radius:2px;margin-top:3px;overflow:hidden}
.ch-bar-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--primary));border-radius:2px;transition:width .5s var(--ease);width:0%}
.ch-cnt{font-size:9px;color:var(--muted2);background:var(--glass);padding:2px 6px;border-radius:20px;transition:all var(--ease)}
.ch-item.active .ch-cnt{background:var(--primary-dim);color:var(--primary)}

/* ══ TOPBAR ══ */
.main{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{
  background:var(--surface);backdrop-filter:blur(28px) saturate(1.4);
  -webkit-backdrop-filter:blur(28px) saturate(1.4);
  border-bottom:1px solid var(--border2);
  padding:0 22px;height:60px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:40;transition:background var(--ease);
}
.tb-left{display:flex;align-items:center;gap:10px}
.mob-btn{display:none;width:34px;height:34px;background:var(--glass);border:1px solid var(--border2);border-radius:8px;cursor:pointer;align-items:center;justify-content:center;font-size:16px;color:var(--text)}
.tb-title{font-size:17px;font-weight:900;letter-spacing:-.3px}
.tb-badge{background:rgba(0,229,160,.1);border:1px solid rgba(0,229,160,.25);color:var(--accent);border-radius:20px;padding:3px 10px;font-size:11px;font-weight:600}
.tb-right{display:flex;align-items:center;gap:6px}
.tb-btn{background:var(--glass);border:1px solid var(--border2);border-radius:7px;color:var(--muted);font-size:11px;padding:6px 11px;cursor:pointer;transition:all var(--ease);font-family:'Cairo',sans-serif;font-weight:700}
.tb-btn:hover{border-color:var(--primary);color:var(--primary);background:var(--primary-dim)}
.theme-btn{width:34px;height:34px;background:var(--glass);border:1px solid var(--border2);border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;color:var(--muted);transition:all var(--ease)}
.theme-btn:hover{border-color:var(--primary);color:var(--primary);transform:rotate(20deg)}

/* ══ CONTENT ══ */
.content{padding:24px;max-width:800px;margin:0 auto;width:100%}
.ch-hdr{
  display:flex;align-items:center;gap:16px;padding:20px 24px;
  background:var(--card);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border:1px solid var(--border2);border-radius:var(--r);margin-bottom:14px;
  position:relative;overflow:hidden;box-shadow:var(--glass-shadow);
}
.ch-hdr::before{content:'';position:absolute;top:0;right:0;width:220px;height:100%;background:linear-gradient(90deg,transparent,rgba(124,106,255,.05));pointer-events:none}
.ch-hdr::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,var(--primary),transparent 70%);opacity:.3}
.ch-hdr-num{width:60px;height:60px;flex-shrink:0;background:linear-gradient(135deg,var(--primary),#8b5cf6);border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:900;color:#fff;box-shadow:0 6px 24px rgba(124,106,255,.45)}
.ch-hdr-info h2{font-size:19px;font-weight:900;margin-bottom:3px;letter-spacing:-.3px}
.ch-hdr-info p{color:var(--muted);font-size:12px}
.ch-hdr-stat{margin-right:auto;display:flex;flex-direction:column;align-items:center;background:rgba(0,229,160,.08);border:1px solid rgba(0,229,160,.2);border-radius:11px;padding:8px 14px}
.ch-hdr-stat .big{font-size:20px;font-weight:900;color:var(--accent);line-height:1}
.ch-hdr-stat .sm{font-size:10px;color:var(--muted);margin-top:1px}
.prog-wrap{margin-bottom:14px}
.prog-bar{height:3px;background:var(--border2);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--primary),var(--accent));border-radius:3px;transition:width .5s var(--ease);width:0%}
.prog-txt{font-size:11px;color:var(--muted);margin-top:5px;text-align:right}

/* ══ QUESTION CARDS — GLASSMORPHISM ══ */
.q-list{display:flex;flex-direction:column;gap:8px}
.q-card{
  position:relative;overflow:hidden;
  background:var(--card);
  backdrop-filter:blur(18px) saturate(1.2);
  -webkit-backdrop-filter:blur(18px) saturate(1.2);
  border:1px solid var(--border);border-radius:var(--r2);
  box-shadow:var(--glass-shadow);
  transition:border-color var(--ease),box-shadow var(--ease),transform var(--ease);
}
.q-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.08),transparent)}
.q-card:hover{border-color:var(--border2);transform:translateY(-1px);box-shadow:0 12px 40px rgba(0,0,0,.35),0 0 0 1px rgba(255,255,255,.08) inset}
.q-card.open{border-color:rgba(124,106,255,.4);box-shadow:0 8px 32px rgba(124,106,255,.15),0 0 0 1px rgba(124,106,255,.08) inset;transform:translateY(-1px)}
.q-card.viewed::after{content:'';position:absolute;top:0;right:0;width:3px;height:100%;background:linear-gradient(to bottom,var(--accent),var(--primary));opacity:.8}
.q-hdr{display:flex;align-items:center;gap:10px;padding:13px 16px;cursor:pointer;user-select:none;transition:background var(--ease)}
.q-hdr:hover{background:var(--glass)}
.q-num{width:27px;height:27px;border-radius:7px;flex-shrink:0;background:rgba(124,106,255,.12);border:1px solid rgba(124,106,255,.2);color:#a78bfa;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;transition:all var(--ease)}
.q-card.open .q-num{background:linear-gradient(135deg,var(--primary),#8b5cf6);border-color:transparent;color:#fff;box-shadow:0 2px 10px rgba(124,106,255,.4)}
.q-lbl{font-weight:700;font-size:13px;flex:1;color:var(--muted);transition:color var(--ease)}
.q-card.open .q-lbl,.q-card:hover .q-lbl{color:var(--text)}
.q-arr{width:22px;height:22px;border-radius:6px;background:var(--glass);display:flex;align-items:center;justify-content:center;color:var(--muted2);font-size:11px;transition:transform .35s var(--spring),background var(--ease),color var(--ease)}
.q-card.open .q-arr{transform:rotate(180deg);background:var(--primary-dim);color:var(--primary)}

/* answer — smooth height animation */
.q-body{overflow:hidden;max-height:0;transition:max-height .38s cubic-bezier(.4,0,.2,1)}
.q-card.open .q-body{max-height:700px}
.q-body-in{padding:0 15px 15px;border-top:1px solid var(--border)}
.ans-lbl{font-size:10px;text-transform:uppercase;letter-spacing:2px;color:var(--muted2);margin:11px 0 7px;font-weight:700;display:flex;align-items:center;gap:8px}
.ans-lbl::after{content:'اضغط للنسخ';background:var(--primary-dim);border:1px solid rgba(124,106,255,.25);color:var(--primary);padding:1px 8px;border-radius:20px;font-size:9px;letter-spacing:1px;font-weight:700}
.ans-box{
  position:relative;background:var(--code-bg);backdrop-filter:blur(12px);
  border:1px solid rgba(124,106,255,.15);border-radius:11px;padding:12px 14px;
  cursor:pointer;transition:border-color var(--ease),box-shadow var(--ease),transform .15s;overflow:hidden;
}
.ans-box::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(124,106,255,.3),transparent)}
.ans-box:hover{border-color:rgba(124,106,255,.45);box-shadow:0 4px 20px rgba(124,106,255,.12),0 0 0 3px rgba(124,106,255,.06);transform:translateY(-1px)}
.ans-box:active{transform:scale(.99)}
.ans-box.flash{animation:cpFlash .45s ease}
@keyframes cpFlash{0%{border-color:var(--accent);box-shadow:0 0 0 4px rgba(0,229,160,.15),0 4px 20px rgba(0,229,160,.2)}100%{border-color:rgba(124,106,255,.15);box-shadow:none}}
.ans-plain{font-family:'Cairo',sans-serif;font-size:14px;line-height:1.8;color:var(--text);padding-top:4px}
.ans-code{font-family:'JetBrains Mono',monospace;font-size:12.5px;line-height:1.75;white-space:pre-wrap;word-break:break-all;padding-top:4px}
.kw{color:var(--kw)}.fn{color:var(--fn)}.str{color:var(--str)}.num{color:var(--num)}.op{color:var(--op)}.cm{color:var(--cm);font-style:italic}.pc{color:var(--code-text)}
.cp-hint{position:absolute;top:8px;left:8px;background:rgba(124,106,255,.2);border:1px solid rgba(124,106,255,.35);border-radius:6px;color:#c4b5fd;font-size:10px;padding:3px 8px;pointer-events:none;display:flex;align-items:center;gap:4px;font-family:'Cairo',sans-serif;font-weight:700;transition:all var(--ease)}
.ans-box:hover .cp-hint{background:rgba(124,106,255,.32)}
.ans-box.flash .cp-hint{background:rgba(0,229,160,.2);border-color:rgba(0,229,160,.4);color:var(--accent)}
.code-tag{position:absolute;top:8px;right:8px;font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--muted2);background:var(--glass);border:1px solid var(--border);border-radius:4px;padding:2px 6px;pointer-events:none}
.js-tag{color:#a78bfa;background:rgba(124,106,255,.12);border-color:rgba(124,106,255,.3)}
.html-tag{color:#f97316;background:rgba(249,115,22,.1);border-color:rgba(249,115,22,.3)}
.css-tag{color:#38bdf8;background:rgba(56,189,248,.1);border-color:rgba(56,189,248,.3)}

/* ══ TOAST & SCROLL TOP ══ */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(100px);opacity:0;background:rgba(0,12,8,.85);border:1px solid rgba(0,229,160,.4);backdrop-filter:blur(20px);color:var(--accent);padding:10px 22px;border-radius:40px;font-size:13px;font-weight:700;z-index:9997;transition:transform .38s var(--spring),opacity .3s;pointer-events:none;white-space:nowrap;box-shadow:0 4px 30px rgba(0,229,160,.2)}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.scr-top{position:fixed;bottom:26px;left:26px;width:44px;height:44px;border-radius:50%;border:none;background:linear-gradient(135deg,var(--primary),#8b5cf6);color:#fff;font-size:18px;cursor:pointer;box-shadow:0 4px 20px rgba(124,106,255,.5);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;z-index:500;transition:opacity .3s,transform var(--spring)}
.scr-top.vis{opacity:1;pointer-events:auto}
.scr-top:hover{transform:scale(1.12) translateY(-2px)}

/* ══ DEV SECTION ══ */
.dev-section{padding:24px 24px 60px;max-width:800px;margin:0 auto;width:100%}
.dev-card{position:relative;overflow:hidden;background:var(--card);backdrop-filter:blur(24px) saturate(1.3);-webkit-backdrop-filter:blur(24px) saturate(1.3);border:1px solid var(--border2);border-radius:24px;box-shadow:var(--glass-shadow)}
.dev-card::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--primary),var(--secondary),var(--accent))}
.dev-hero{position:relative;height:380px;overflow:hidden}
.dev-img{width:100%;height:100%;object-fit:cover;object-position:center 22%;display:block;filter:brightness(.82) contrast(1.06) saturate(1.08);transition:transform .7s ease}
.dev-card:hover .dev-img{transform:scale(1.03)}
.dev-ov{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(7,7,26,.05) 0%,rgba(7,7,26,.97) 100%)}
.dev-badge{position:absolute;top:14px;right:14px;background:rgba(124,106,255,.22);border:1px solid rgba(124,106,255,.45);backdrop-filter:blur(12px);border-radius:30px;padding:4px 12px;font-size:11px;font-weight:700;color:#c4b5fd;letter-spacing:.5px}
.dev-info{position:absolute;bottom:0;left:0;right:0;padding:18px 22px}
.dev-name{font-size:26px;font-weight:900;background:linear-gradient(135deg,#fff 40%,#c4b5fd);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:2px}
.dev-role{font-size:10px;text-transform:uppercase;letter-spacing:2.5px;color:var(--primary);font-weight:600}
.dev-body{padding:20px 22px 24px}
.dev-bio{color:var(--muted);font-size:13px;line-height:1.8;margin-bottom:20px;border-right:2px solid rgba(124,106,255,.3);padding-right:12px}
.dev-ct{font-size:9px;text-transform:uppercase;letter-spacing:2px;color:var(--muted2);font-weight:700;margin-bottom:10px}
.dev-links{display:flex;flex-wrap:wrap;gap:8px}
.dlnk{display:inline-flex;align-items:center;gap:8px;border-radius:12px;padding:10px 16px;font-size:13px;font-weight:700;text-decoration:none;transition:transform var(--ease),box-shadow var(--ease),border-color var(--ease);font-family:'Cairo',sans-serif;backdrop-filter:blur(8px)}
.dlnk:hover{transform:translateY(-3px)}
.lic{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.wa{background:rgba(37,211,102,.12);border:1px solid rgba(37,211,102,.3);color:#25d366}.wa:hover{box-shadow:0 8px 28px rgba(37,211,102,.25);border-color:rgba(37,211,102,.55)}.wa .lic{background:rgba(37,211,102,.15)}
.ph{background:rgba(0,229,160,.1);border:1px solid rgba(0,229,160,.3);color:var(--accent)}.ph:hover{box-shadow:0 8px 28px rgba(0,229,160,.22);border-color:rgba(0,229,160,.55)}.ph .lic{background:rgba(0,229,160,.15)}
.tt{background:rgba(255,95,135,.1);border:1px solid rgba(255,95,135,.3);color:var(--secondary)}.tt:hover{box-shadow:0 8px 28px rgba(255,95,135,.22);border-color:rgba(255,95,135,.55)}.tt .lic{background:rgba(255,95,135,.15)}
.fb{background:rgba(24,119,242,.12);border:1px solid rgba(24,119,242,.3);color:#4a9ff5}.fb:hover{box-shadow:0 8px 28px rgba(24,119,242,.22);border-color:rgba(24,119,242,.55)}.fb .lic{background:rgba(24,119,242,.15)}

/* overlay */
.sb-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:45;backdrop-filter:blur(6px)}

/* page transition */
.ch-page{display:none}.ch-page.active{display:block;animation:pgIn .25s ease}
@keyframes pgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* RESPONSIVE */
@media(max-width:900px){
  .sidebar{position:fixed;right:0;top:0;transform:translateX(110%);z-index:50;box-shadow:-20px 0 60px rgba(0,0,0,.5)}
  .sidebar.open{transform:translateX(0)}
  .sb-ov.show{display:block}
  .mob-btn{display:flex}
  .topbar{padding:0 14px}
  .tb-title{font-size:15px}
  .content,.dev-section{padding:16px 14px}
  .tb-btn.hm{display:none}
  .scr-top{left:14px;bottom:14px}
}
@media(max-width:480px){
  .ch-hdr{flex-wrap:wrap;gap:10px}
  .ch-hdr-stat{margin-right:0}
  .dev-hero{height:260px}
  .dev-name{font-size:20px}
}
</style>
</head>

// ══ SYNTAX HIGHLIGHT ══
function hl(code) {
  var h = code.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  var KW = {'let':1,'const':1,'var':1,'function':1,'return':1,'if':1,'else':1,'for':1,'while':1,'switch':1,'case':1,'break':1,'default':1,'of':1,'in':1,'new':1,'typeof':1,'true':1,'false':1,'null':1,'undefined':1};
  var out = '';
  var i = 0;
  while (i < h.length) {
    // HTML entities — output as one unit so textContent decodes them correctly
    if (h[i] === '&') {
      var end = h.indexOf(';', i);
      if (end !== -1 && end - i <= 6) {
        out += '<span class="op">' + h.slice(i, end + 1) + '</span>';
        i = end + 1;
        continue;
      }
    }
    // comment
    if (h[i]==='/' && h[i+1]==='/') {
      var end2 = h.indexOf('\n', i);
      if (end2 === -1) end2 = h.length;
      out += '<span class="cm">' + h.slice(i, end2) + '</span>';
      i = end2;
      continue;
    }
    // string
    if (h[i]==='"' || h[i]==="'" || h[i]==='`') {
      var q = h[i]; var j = i+1;
      while (j < h.length && h[j] !== q) { if (h[j]==='\\') j++; j++; }
      out += '<span class="str">' + h.slice(i, j+1) + '</span>';
      i = j+1;
      continue;
    }
    // number
    if (h[i] >= '0' && h[i] <= '9') {
      var j = i;
      while (j < h.length && ((h[j] >= '0' && h[j] <= '9') || h[j] === '.')) j++;
      out += '<span class="num">' + h.slice(i, j) + '</span>';
      i = j;
      continue;
    }
    // word (keyword or builtin)
    if ((h[i] >= 'a' && h[i] <= 'z') || (h[i] >= 'A' && h[i] <= 'Z') || h[i]==='_') {
      var j = i;
      while (j < h.length && ((h[j] >= 'a' && h[j] <= 'z') || (h[j] >= 'A' && h[j] <= 'Z') || (h[j] >= '0' && h[j] <= '9') || h[j]==='_' || h[j]==='.')) j++;
      var word = h.slice(i, j);
      var base = word.split('.')[0];
      if (KW[base]) {
        out += '<span class="kw">' + word + '</span>';
      } else if (word === 'console.log' || word === 'console.error' || (word.indexOf('Math.') === 0)) {
        out += '<span class="fn">' + word + '</span>';
      } else {
        out += '<span class="pc">' + word + '</span>';
      }
      i = j;
      continue;
    }
    out += h[i];
    i++;
  }
  return out;
}

// ══ CODE FORMATTERS ══
function fmtJS(code) {
  var out = '', depth = 0, paren = 0, inStr = false, strCh = '';
  var pad = function() { return '\n' + '  '.repeat(depth); };
  for (var i = 0; i < code.length; i++) {
    var c = code[i];
    if (inStr) {
      out += c;
      if (c === '\\') { out += code[++i]; }
      else if (c === strCh) inStr = false;
      continue;
    }
    if (c === '"' || c === "'" || c === '`') { inStr = true; strCh = c; out += c; continue; }
    if (c === '(') { paren++; out += c; continue; }
    if (c === ')') { paren = Math.max(0, paren - 1); out += c; continue; }
    if (c === '{') {
      out = out.trimEnd() + ' {'; depth++;
      while (i + 1 < code.length && code[i + 1] === ' ') i++;
      out += pad(); continue;
    }
    if (c === '}') {
      depth = Math.max(0, depth - 1);
      out = out.trimEnd() + '\n' + '  '.repeat(depth) + '}';
      var j = i + 1;
      while (j < code.length && code[j] === ' ') j++;
      var nx = code.slice(j, j + 4);
      if (nx === 'else' || nx === 'catc') { out += ' '; i = j - 1; }
      else if (j < code.length) { out += pad(); i = j - 1; }
      continue;
    }
    if (c === ';' && paren === 0) {
      out += ';';
      var j = i + 1;
      while (j < code.length && code[j] === ' ') j++;
      if (j < code.length && code[j] !== '}') { out += pad(); i = j - 1; }
      else if (j < code.length) { i = j - 1; }
      continue;
    }
    if (c === ' ' && out.length > 0 && out[out.length - 1] === ' ') continue;
    out += c;
  }
  return out.trim();
}

function fmtHTML(code) {
  return code.replace(/>\s*</g, '>\n<').trim();
}

function fmtCSS(code) {
  return code
    .replace(/\s*\{\s*/g, ' {\n  ')
    .replace(/;\s*/g, ';\n  ')
    .replace(/\s+\}/g, '\n}')
    .replace(/\}\s*/g, '}\n')
    .replace(/\n\s*\n/g, '\n')
    .trim();
}

function formatCode(a, lang) {
  if (lang === 'html') return fmtHTML(a);
  if (lang === 'css') return fmtCSS(a);
  return fmtJS(a);
}

// ══ STATE ══
var cur = 0;
var opened = {};
var toastT = null;

function saveOpened() {
  try { localStorage.setItem('zmax_opened', JSON.stringify(opened)); } catch(e) {}
}

function loadOpened() {
  try {
    var s = localStorage.getItem('zmax_opened');
    if (s) opened = JSON.parse(s);
  } catch(e) { opened = {}; }
}

function init() {
  loadOpened();
  var tot = 0;
  for (var i = 0; i < chapters.length; i++) tot += chapters[i].qs.length;
  document.getElementById('totEl').textContent = tot;
  document.getElementById('opnEl').textContent = Object.keys(opened).length;
  buildSidebar();
  buildPages();
  restoreOpenCards();
  fillPage(0);
  updateTopbar(0);
  restoreLast();
  initScrollTop();
  initSwipe();
  for (var i = 0; i < chapters.length; i++) updateProg(i);
}

function buildSidebar() {
  var cl = document.getElementById('chList');
  cl.innerHTML = '';
  for (var i = 0; i < chapters.length; i++) {
    (function(idx) {
      var ch = chapters[idx];
      var el = document.createElement('div');
      el.className = 'ch-item' + (idx === 0 ? ' active' : '');
      el.id = 'nav-' + idx;
      el.innerHTML = '<div class="ch-badge">' + ch.num + '</div><div class="ch-info"><div class="ch-lbl">الفصل ' + ch.num + '</div><div class="ch-bar"><div class="ch-bar-fill" id="sbp-' + idx + '"></div></div></div><div class="ch-cnt" id="sbc-' + idx + '">' + ch.qs.length + '</div>';
      el.onclick = function() { gotoCh(idx); };
      cl.appendChild(el);
    })(i);
  }
}

function buildPages() {
  var pc = document.getElementById('pagesEl');
  pc.innerHTML = '';
  for (var i = 0; i < chapters.length; i++) {
    (function(ci) {
      var ch = chapters[ci];
      var pg = document.createElement('div');
      pg.className = 'ch-page' + (ci === 0 ? ' active' : '');
      pg.id = 'pg-' + ci;
      var qs = '';
      for (var qi = 0; qi < ch.qs.length; qi++) {
        (function(qii) {
          var q = ch.qs[qii];
          qs += '<div class="q-card" id="qc-' + ci + '-' + qii + '">' +
            '<div class="q-hdr" onclick="toggleQ(' + ci + ',' + qii + ')">' +
              '<div class="q-num">' + (qii+1) + '</div>' +
              '<div class="q-lbl">' + q.q + '</div>' +
              '<div class="q-arr">&#9662;</div>' +
            '</div>' +
            '<div class="q-body"><div class="q-body-in">' +
              '<div class="ans-lbl">الإجابة</div>' +
              '<div class="ans-box" onclick="copyAns(' + ci + ',' + qii + ',this)">' +
                '<span class="cp-hint">📋 انسخ</span>' +
                (q.code ? '<span class="code-tag ' + detectLang(q.a) + '-tag">' + detectLang(q.a).toUpperCase() + '</span>' : '') +
                '<div class="' + (q.code ? 'ans-code' : 'ans-plain') + '" id="ansel-' + ci + '-' + qii + '"></div>' +
              '</div>' +
            '</div></div>' +
          '</div>';
        })(qi);
      }
      pg.innerHTML = '<div class="content">' +
        '<div class="ch-hdr">' +
          '<div class="ch-hdr-num">' + ch.num + '</div>' +
          '<div class="ch-hdr-info"><h2>الفصل ' + ch.num + '</h2><p>اضغط على الإجابة لنسخها</p></div>' +
          '<div class="ch-hdr-stat"><div class="big">' + ch.qs.length + '</div><div class="sm">سؤال</div></div>' +
        '</div>' +
        '<div class="prog-wrap"><div class="prog-bar"><div class="prog-fill" id="mp-' + ci + '"></div></div><div class="prog-txt" id="mpt-' + ci + '">0 / ' + ch.qs.length + ' سؤال تم فتحه</div></div>' +
        '<div class="q-list">' + qs + '</div>' +
      '</div>';
      pc.appendChild(pg);
    })(i);
  }
}

function fillPage(ci) {
  var ch = chapters[ci];
  for (var qi = 0; qi < ch.qs.length; qi++) {
    var el = document.getElementById('ansel-' + ci + '-' + qi);
    if (el && !el.getAttribute('data-f')) {
      el.setAttribute('data-f', '1');
      if (ch.qs[qi].code) {
        var ans = ch.qs[qi].a;
        var lang = detectLang(ans);
        var fmt = formatCode(ans, lang);
        if (lang === 'js') {
          el.innerHTML = hl(fmt);
        } else {
          el.textContent = fmt;
        }
      } else {
        el.textContent = ch.qs[qi].a;
      }
    }
  }
}

function updateTopbar(i) {
  document.getElementById('tbTitle').textContent = 'الفصل ' + chapters[i].num;
  document.getElementById('tbBadge').textContent = chapters[i].qs.length + ' سؤال';
}

function gotoCh(i) {
  if (i < 0 || i >= chapters.length) return;
  var items = document.querySelectorAll('.ch-item');
  var pages = document.querySelectorAll('.ch-page');
  for (var j = 0; j < items.length; j++) items[j].classList.toggle('active', j === i);
  for (var j = 0; j < pages.length; j++) pages[j].classList.toggle('active', j === i);
  cur = i;
  updateTopbar(i);
  fillPage(i);
  window.scrollTo({top:0,behavior:'smooth'});
  closeSb();
  localStorage.setItem('zmax_last', i);
  updateProg(i);
}

function restoreOpenCards() {
  for (var key in opened) {
    if (!opened[key]) continue;
    var parts = key.split('-');
    var card = document.getElementById('qc-' + parts[0] + '-' + parts[1]);
    if (card) card.classList.add('viewed');
  }
}

function restoreLast() {
  var s = localStorage.getItem('zmax_last');
  if (s !== null) {
    var i = parseInt(s);
    if (i > 0 && i < chapters.length) gotoCh(i);
  }
}

function toggleQ(ci, qi) {
  var card = document.getElementById('qc-' + ci + '-' + qi);
  var wasOpen = card.classList.contains('open');
  card.classList.toggle('open');
  card.classList.add('viewed');
  if (!wasOpen) {
    var key = ci + '-' + qi;
    if (!opened[key]) {
      opened[key] = true;
      updateProg(ci);
      document.getElementById('opnEl').textContent = Object.keys(opened).length;
      saveOpened();
    }
  }
}

function updateProg(ci) {
  var tot = chapters[ci].qs.length;
  var cnt = 0;
  for (var qi = 0; qi < tot; qi++) { if (opened[ci + '-' + qi]) cnt++; }
  var pct = tot ? Math.round(cnt / tot * 100) : 0;
  var sbp = document.getElementById('sbp-' + ci);
  var mp = document.getElementById('mp-' + ci);
  var mpt = document.getElementById('mpt-' + ci);
  if (sbp) sbp.style.width = pct + '%';
  if (mp) mp.style.width = pct + '%';
  if (mpt) mpt.textContent = cnt + ' / ' + tot + ' سؤال تم فتحه';
}

function copyAns(ci, qi, box) {
  var inner = box.querySelector('.ans-code, .ans-plain');
  if (!inner) return;
  var txt = inner.textContent.trim();
  var hint = box.querySelector('.cp-hint');
  var prev = hint ? hint.textContent : '';
  function flash() {
    box.classList.add('flash');
    if (hint) hint.textContent = '✅ تم!';
    setTimeout(function() { box.classList.remove('flash'); if (hint) hint.textContent = prev; }, 1800);
    showToast('✅ تم نسخ الإجابة!');
  }
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(txt).then(flash).catch(function() { fbCopy(txt, flash); });
  } else { fbCopy(txt, flash); }
}

function fbCopy(txt, cb) {
  var ta = document.createElement('textarea');
  ta.value = txt; ta.style.position = 'fixed'; ta.style.opacity = '0';
  document.body.appendChild(ta); ta.focus(); ta.select();
  try { document.execCommand('copy'); cb(); } catch(e) {}
  document.body.removeChild(ta);
}

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastT);
  toastT = setTimeout(function() { t.classList.remove('show'); }, 2500);
}

function expandAll() {
  var p = document.querySelector('.ch-page.active');
  if (!p) return;
  var cards = p.querySelectorAll('.q-card');
  for (var i = 0; i < cards.length; i++) {
    cards[i].classList.add('open', 'viewed');
    var key = cur + '-' + i;
    if (!opened[key]) { opened[key] = true; }
  }
  updateProg(cur);
  document.getElementById('opnEl').textContent = Object.keys(opened).length;
}

function collapseAll() {
  var p = document.querySelector('.ch-page.active');
  if (p) { var cards = p.querySelectorAll('.q-card'); for (var i=0;i<cards.length;i++) cards[i].classList.remove('open'); }
}

function filterCh(v) {
  v = v.trim();
  var items = document.querySelectorAll('.ch-item');
  for (var i = 0; i < items.length; i++) {
    var m = !v || String(chapters[i].num).indexOf(v) !== -1 || ('الفصل ' + chapters[i].num).indexOf(v) !== -1;
    items[i].style.display = m ? '' : 'none';
  }
}

function openSb() { document.getElementById('sidebar').classList.add('open'); document.getElementById('sbOv').classList.add('show'); }
function closeSb() { document.getElementById('sidebar').classList.remove('open'); document.getElementById('sbOv').classList.remove('show'); }

function initScrollTop() {
  var btn = document.getElementById('scrTop');
  window.addEventListener('scroll', function() { btn.classList.toggle('vis', window.scrollY > 300); }, {passive:true});
}

function initSwipe() {
  var el = document.getElementById('mainEl');
  var sx = 0, sy = 0;
  el.addEventListener('touchstart', function(e) { sx = e.touches[0].clientX; sy = e.touches[0].clientY; }, {passive:true});
  el.addEventListener('touchend', function(e) {
    var dx = e.changedTouches[0].clientX - sx;
    var dy = e.changedTouches[0].clientY - sy;
    if (Math.abs(dx) > 65 && Math.abs(dx) > Math.abs(dy) * 1.5) {
      if (dx > 0 && cur > 0) gotoCh(cur - 1);
      else if (dx < 0 && cur < chapters.length - 1) gotoCh(cur + 1);
    }
  }, {passive:true});
}
</script>
</body>
